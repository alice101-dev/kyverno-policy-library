apiVersion: v1
kind: Pod
metadata:
  name: good-pod-no-escalation
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      securityContext:
        allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-escalation
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      # allowPrivilegeEscalation defaults to true — must be rejected
---
apiVersion: v1
kind: Pod
metadata:
  name: exempt-system-pod
  namespace: kube-system
spec:
  containers:
    - name: app
      image: nginx:latest
      # non-compliant, but kube-system is excluded — the rule must be skipped
