apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/description: >-
      allowPrivilegeEscalation lets a process gain more privileges than its
      parent (e.g. via setuid binaries). Setting it to false closes a common
      container-escape path. Required by the restricted Pod Security Standard.
      Applies to regular and init containers; ephemeral (debug) containers are
      exempt so kubectl debug keeps working.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-privilege-escalation
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          variables:
            - name: allContainers
              expression: >-
                object.spec.containers + object.spec.?initContainers.orValue([])
          expressions:
            # unset defaults to true at runtime, so it must be explicitly false
            - expression: >-
                variables.allContainers.all(c,
                  c.?securityContext.?allowPrivilegeEscalation.orValue(true) == false)
              message: >-
                Privilege escalation is disallowed. All containers (including
                init containers) must set
                securityContext.allowPrivilegeEscalation to false.
