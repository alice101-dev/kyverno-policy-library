apiVersion: v1
kind: Service
metadata:
  name: good-svc-cluster-ip
  namespace: backend
spec:
  selector:
    app: web
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bad-svc-loadbalancer
  namespace: backend
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - port: 443
---
apiVersion: v1
kind: Service
metadata:
  name: exempt-system-svc
  namespace: kube-system
spec:
  type: LoadBalancer
  selector:
    app: system
  ports:
    - port: 443
