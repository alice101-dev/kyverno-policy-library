apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-pod-exec
  annotations:
    policies.kyverno.io/title: Block Pod Exec
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/description: >-
      `kubectl exec` and `kubectl attach` open an interactive shell into a
      running container — access that bypasses every review the image and
      manifest went through, and the channel `kubectl cp` rides on. This
      policy denies the exec and attach subresources (CONNECT) outside system
      namespaces. Exec sessions are not persisted objects, so background
      scanning is off and there are no PolicyReport entries: admission is the
      only enforcement point. `kyverno test` cannot simulate CONNECT
      admission; this policy is verified live by e2e/exec-policies.sh on a
      kind cluster. To keep a break-glass path, add a CEL exemption on
      request.userInfo.groups for your SRE group.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: deny-exec-attach
      match:
        any:
          - resources:
              kinds:
                - Pod/exec
                - Pod/attach
              operations:
                - CONNECT
      # GKE-managed / system namespaces: operators and Google-managed agents
      # must keep shell access for node debugging and support.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          expressions:
            - expression: "false"
              message: >-
                Interactive access (kubectl exec/attach) to containers is
                blocked in this namespace. Ship debug tooling in the image or
                use logs/events instead.
