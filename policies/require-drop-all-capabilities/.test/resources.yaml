apiVersion: v1
kind: Pod
metadata:
  name: good-pod-drop-all
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      securityContext:
        capabilities:
          drop:
            - ALL
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-keeps-caps
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      # no capabilities.drop — must be rejected
