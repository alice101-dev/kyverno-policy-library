apiVersion: v1
kind: Pod
metadata:
  name: good-pod-profiles
  namespace: backend
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
    appArmorProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: nginx:1.29
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-no-profiles
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      # no seccomp / apparmor profiles — must be rejected by both rules
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-seccomp-override
  namespace: backend
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
    appArmorProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: nginx:1.29
      securityContext:
        seccompProfile:
          # opts out of the pod-level profile — seccomp rule must reject
          type: Unconfined
---
apiVersion: v1
kind: Pod
metadata:
  name: exempt-system-pod
  namespace: kube-system
spec:
  containers:
    - name: app
      image: nginx:latest
      # non-compliant, but kube-system is excluded — the rule must be skipped
