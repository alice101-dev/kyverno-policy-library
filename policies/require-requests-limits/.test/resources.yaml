apiVersion: v1
kind: Pod
metadata:
  name: good-pod
spec:
  containers:
    - name: app
      image: nginx:1.29
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-no-limits
spec:
  containers:
    - name: app
      image: nginx:1.29
      # no resources block at all — must be rejected
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-init-no-limits
spec:
  initContainers:
    - name: setup
      image: busybox:1.37
      # no resources on the init container — must be rejected
  containers:
    - name: app
      image: nginx:1.29
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          memory: "256Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: exempt-system-pod
  namespace: kube-system
spec:
  containers:
    - name: app
      image: nginx:latest
      # non-compliant, but kube-system is excluded — the rule must be skipped
