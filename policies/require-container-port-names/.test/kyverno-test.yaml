apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-container-port-names
policies:
  - ../policy.yaml
resources:
  - resources.yaml
results:
  - policy: require-container-port-names
    isValidatingPolicy: true
    kind: Pod
    resources:
      - good-pod-named-ports
      - good-pod-no-ports
    result: pass
  - policy: require-container-port-names
    isValidatingPolicy: true
    kind: Pod
    resources:
      - bad-pod-unnamed-port
    result: fail
  - policy: require-container-port-names
    isValidatingPolicy: true
    kind: Pod
    resources:
      - exempt-system-pod
    result: skip
