apiVersion: v1
kind: Pod
metadata:
  name: good-pod
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod
  namespace: default
spec:
  containers:
    - name: app
      image: nginx:1.29
---
apiVersion: v1
kind: Pod
metadata:
  name: exempt-system-pod
  namespace: kube-system
spec:
  containers:
    - name: app
      image: nginx:latest
      # non-compliant, but kube-system is excluded — the rule must be skipped
