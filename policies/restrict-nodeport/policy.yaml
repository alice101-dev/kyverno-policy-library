apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-nodeport
  annotations:
    policies.kyverno.io/title: Disallow NodePort
    policies.kyverno.io/category: Network Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Service
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/description: >-
      A NodePort Service opens the same port on every node, reachable from any
      source — and NetworkPolicy cannot filter host ports. Use LoadBalancer or
      Ingress instead, where traffic passes governed entry points. This policy
      rejects Services of type NodePort.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-nodeport
      match:
        any:
          - resources:
              kinds:
                - Service
              operations:
                - CREATE
                - UPDATE
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          expressions:
            # an unset type defaults to ClusterIP
            - expression: >-
                object.spec.?type.orValue('ClusterIP') != 'NodePort'
              message: Services of type NodePort are not allowed.
