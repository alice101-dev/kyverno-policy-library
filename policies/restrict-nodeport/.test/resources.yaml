apiVersion: v1
kind: Service
metadata:
  name: good-svc-cluster-ip
  namespace: backend
spec:
  # no type set — defaults to ClusterIP
  selector:
    app: web
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bad-svc-nodeport
  namespace: backend
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: exempt-system-svc
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app: system
  ports:
    - port: 443
      nodePort: 30443
