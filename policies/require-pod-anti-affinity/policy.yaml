apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-pod-anti-affinity
  annotations:
    policies.kyverno.io/title: Require Replica Spreading
    policies.kyverno.io/category: High Availability
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Deployment, StatefulSet
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/description: >-
      A PDB can't protect availability if every replica lands on one node.
      This policy requires workloads to spread replicas — via
      topologySpreadConstraints, OR soft (preferred) pod anti-affinity, OR
      hard (required) pod anti-affinity. Any of the three satisfies it.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-replica-spreading
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
              operations:
                - CREATE
                - UPDATE
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          variables:
            - name: podSpec
              expression: object.spec.template.spec
            - name: antiAffinity
              expression: variables.podSpec.?affinity.?podAntiAffinity.orValue({})
          expressions:
            # any of the three spreading mechanisms satisfies the rule
            - expression: >-
                variables.podSpec.?topologySpreadConstraints.orValue([]).size() > 0 ||
                variables.antiAffinity.?preferredDuringSchedulingIgnoredDuringExecution.orValue([]).size() > 0 ||
                variables.antiAffinity.?requiredDuringSchedulingIgnoredDuringExecution.orValue([]).size() > 0
              message: >-
                Workloads must spread replicas across nodes/zones: set
                topologySpreadConstraints, or soft/hard podAntiAffinity.
