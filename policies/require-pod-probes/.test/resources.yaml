apiVersion: v1
kind: Pod
metadata:
  name: good-pod-probes
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-startup-only
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      # any one of the three probes satisfies the rule
      startupProbe:
        tcpSocket:
          port: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-no-probes
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      # no probes at all — must be rejected
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-one-container-missing
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:1.29
      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
    - name: sidecar
      image: envoyproxy/envoy:v1.31.0
      # sidecar has no probe — must be rejected
---
apiVersion: v1
kind: Pod
metadata:
  name: exempt-system-pod
  namespace: kube-system
spec:
  containers:
    - name: app
      image: nginx:latest
      # non-compliant, but kube-system is excluded — the rule must be skipped
