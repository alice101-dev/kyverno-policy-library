apiVersion: v1
kind: Pod
metadata:
  name: good-pod-latest-always
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:latest
      imagePullPolicy: Always
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-pinned-ifnotpresent
  namespace: backend
spec:
  containers:
    - name: app
      # pinned tag — any pull policy is fine
      image: nginx:1.29
      imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pod-digest
  namespace: backend
spec:
  containers:
    - name: app
      # digest-pinned images are immutable — exempt
      image: nginx@sha256:0d17b565c37bcbd895e9d92315a05c1c3c9a29f762b011a10c54a66cd53c9b31
      imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-latest-ifnotpresent
  namespace: backend
spec:
  containers:
    - name: app
      image: nginx:latest
      imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-untagged-port
  namespace: backend
spec:
  containers:
    - name: app
      # the ':' is a registry port, not a tag — image is untagged
      image: registry.example.com:5000/app
      imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Pod
metadata:
  name: exempt-system-pod
  namespace: kube-system
spec:
  containers:
    - name: app
      image: nginx:latest
      imagePullPolicy: IfNotPresent
