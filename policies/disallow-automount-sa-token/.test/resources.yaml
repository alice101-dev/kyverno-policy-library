apiVersion: v1
kind: Pod
metadata:
  name: good-pod-no-token
  namespace: backend
spec:
  automountServiceAccountToken: false
  containers:
    - name: app
      image: nginx:1.29
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-token-mounted
  namespace: backend
spec:
  # automountServiceAccountToken defaults to true — must be rejected
  containers:
    - name: app
      image: nginx:1.29
