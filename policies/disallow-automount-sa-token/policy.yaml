apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-automount-sa-token
  annotations:
    policies.kyverno.io/title: Disallow Automounting Service Account Tokens
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      A mounted service-account token is a credential an attacker can steal to
      talk to the Kubernetes API. Workloads that don't call the API (most of
      them) should set automountServiceAccountToken=false.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-automount-sa-token
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Pods must set automountServiceAccountToken to false unless they call the Kubernetes API."
        pattern:
          spec:
            automountServiceAccountToken: "false"
