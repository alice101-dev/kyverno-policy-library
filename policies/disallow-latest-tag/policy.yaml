apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/description: >-
      A `:latest` (or untagged) image is not reproducible: two pods scheduled a
      minute apart can run different code, and a rollback restores a tag, not a
      build. This policy requires an explicit, non-latest tag (or a digest) on
      every container and init container. Ephemeral (debug) containers are
      exempt so kubectl debug keeps working.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          variables:
            - name: allContainers
              expression: >-
                object.spec.containers + object.spec.?initContainers.orValue([])
          expressions:
            # the tag lives after the last '/', so a registry port
            # (registry:5000/app) doesn't count as one; a digest ('@') is fine
            - expression: >-
                variables.allContainers.all(c, c.image.contains('@') ||
                  c.image.substring(c.image.lastIndexOf('/') + 1).contains(':'))
              message: "An explicit image tag (or digest) is required."
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          variables:
            - name: allContainers
              expression: >-
                object.spec.containers + object.spec.?initContainers.orValue([])
          expressions:
            - expression: >-
                variables.allContainers.all(c, !c.image.endsWith(':latest'))
              message: >-
                Using a mutable ':latest' tag is not allowed; pin a version or
                digest.
