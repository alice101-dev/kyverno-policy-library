apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: verify-image-signatures
policies:
  - ../policy.yaml
resources:
  - resources.yaml
results:
  - policy: verify-image-signatures
    rule: verify-signature
    kind: Pod
    resources:
      - good-pod-signed
    result: pass
  - policy: verify-image-signatures
    rule: verify-signature
    kind: Pod
    resources:
      - bad-pod-unsigned
    result: fail
  - policy: verify-image-signatures
    rule: verify-signature
    kind: Pod
    resources:
      - exempt-system-pod
    result: skip
