apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: prevent-bare-pods
  annotations:
    # this rule must only ever see actual Pods, never be autogenerated
    # for controllers — a controller's pod template has no ownerReferences
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Prevent Bare Pods
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/description: >-
      A Pod created directly (not via a Deployment, StatefulSet, DaemonSet, or
      Job) has no self-healing, no scaling, and disappears on node failure.
      This policy rejects Pods without an ownerReference, i.e. anything not
      created by a workload controller.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: bare-pods
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          expressions:
            - expression: >-
                'ownerReferences' in object.metadata
              message: Bare Pods are not allowed; they must be created by a workload controller.
