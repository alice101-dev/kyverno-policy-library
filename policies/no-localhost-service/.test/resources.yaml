apiVersion: v1
kind: Service
metadata:
  name: good-svc-externalname
  namespace: backend
spec:
  type: ExternalName
  externalName: db.example.com
---
apiVersion: v1
kind: Service
metadata:
  name: good-svc-cluster-ip
  namespace: backend
spec:
  # not an ExternalName Service — nothing to check
  selector:
    app: web
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bad-svc-localhost
  namespace: backend
spec:
  type: ExternalName
  # points back at the resolver itself — must be rejected
  externalName: localhost
---
apiVersion: v1
kind: Service
metadata:
  name: exempt-system-svc
  namespace: kube-system
spec:
  type: ExternalName
  externalName: localhost
