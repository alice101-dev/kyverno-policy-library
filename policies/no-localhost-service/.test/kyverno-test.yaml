apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: no-localhost-service
policies:
  - ../policy.yaml
resources:
  - resources.yaml
results:
  - policy: no-localhost-service
    rule: no-localhost-service
    kind: Service
    resources:
      - good-svc-externalname
      - good-svc-cluster-ip
    result: pass
  - policy: no-localhost-service
    rule: no-localhost-service
    kind: Service
    resources:
      - bad-svc-localhost
    result: fail
  - policy: no-localhost-service
    rule: no-localhost-service
    kind: Service
    resources:
      - exempt-system-svc
    result: skip
