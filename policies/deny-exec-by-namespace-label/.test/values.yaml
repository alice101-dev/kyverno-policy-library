apiVersion: cli.kyverno.io/v1alpha1
kind: Values
metadata:
  name: values
policies:
  - name: deny-exec-by-namespace-label
    resources:
      # stub the admission operation and the apiCall result (the namespace's
      # `exec` label) — neither is available offline
      - name: bad-exec-locked-ns
        values:
          request.operation: CONNECT
          nslabelexec: "false"
      - name: good-exec-open-ns
        values:
          request.operation: CONNECT
          nslabelexec: ""
subresources:
  - subresource:
      name: "pods/exec"
      kind: "PodExecOptions"
      group: ""
      version: "v1"
    parentResource:
      name: "pods"
      kind: "Pod"
      group: ""
      version: "v1"
