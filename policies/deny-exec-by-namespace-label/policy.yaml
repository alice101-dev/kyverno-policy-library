apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-exec-by-namespace-label
  annotations:
    policies.kyverno.io/title: Block Pod Exec by Namespace Label
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      kubectl exec gives shell access inside a running container — useful for
      troubleshooting, but an attack vector in sensitive namespaces. This
      policy denies pods/exec CONNECT requests in any Namespace labeled
      exec=false, so teams can lock down exec per namespace.
spec:
  validationFailureAction: Enforce
  # request.* is only available at admission time, not in background scans
  background: false
  rules:
    - name: deny-exec-by-namespace-label
      match:
        any:
          - resources:
              kinds:
                - Pod/exec
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      # Classic deny+apiCall style, not CEL: `kyverno test` cannot simulate the
      # CONNECT requests a CEL ValidatingPolicy would need (the CLI hardcodes
      # the CREATE operation), so this style keeps the policy unit-testable.
      context:
        - name: nslabelexec
          apiCall:
            urlPath: "/api/v1/namespaces/{{request.namespace}}"
            jmesPath: "metadata.labels.exec || ''"
      preconditions:
        all:
          - key: "{{ request.operation || 'BACKGROUND' }}"
            operator: Equals
            value: CONNECT
      validate:
        message: >-
          Executing a command in a container is forbidden in Namespaces
          protected with the exec=false label.
        deny:
          conditions:
            any:
              - key: "{{ nslabelexec }}"
                operator: Equals
                value: "false"
