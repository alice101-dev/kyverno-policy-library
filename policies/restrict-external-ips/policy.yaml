apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-external-ips
  annotations:
    policies.kyverno.io/title: Restrict External IPs
    policies.kyverno.io/category: Network Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Service
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/description: >-
      Service externalIPs let a Service intercept traffic for an arbitrary IP,
      which enables a man-in-the-middle attack (CVE-2020-8554). Almost no
      workload needs them; LoadBalancer or Ingress are the governed
      alternatives. This policy rejects any Service that sets externalIPs.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-external-ips
      match:
        any:
          - resources:
              kinds:
                - Service
              operations:
                - CREATE
                - UPDATE
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          expressions:
            - expression: >-
                object.spec.?externalIPs.orValue([]).size() == 0
              message: Service externalIPs are not allowed (CVE-2020-8554).
