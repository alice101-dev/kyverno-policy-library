apiVersion: v1
kind: Service
metadata:
  name: good-svc-cluster-ip
  namespace: backend
spec:
  selector:
    app: web
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bad-svc-external-ips
  namespace: backend
spec:
  selector:
    app: web
  ports:
    - port: 80
  # traffic interception vector — must be rejected
  externalIPs:
    - 203.0.113.10
---
apiVersion: v1
kind: Service
metadata:
  name: exempt-system-svc
  namespace: kube-system
spec:
  selector:
    app: system
  ports:
    - port: 443
  externalIPs:
    - 203.0.113.11
