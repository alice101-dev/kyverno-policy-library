apiVersion: v1
kind: Pod
metadata:
  name: good-pod-nonroot
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: nginxinc/nginx-unprivileged:1.29-alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod-root
spec:
  containers:
    - name: app
      image: nginx:1.29
      # no runAsNonRoot anywhere — must be rejected
