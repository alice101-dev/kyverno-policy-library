apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root
  annotations:
    policies.kyverno.io/title: Require Run As Non-Root
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.11.0
    policies.kyverno.io/description: >-
      A container running as root that escapes to the node runs as root on the
      host. This policy requires runAsNonRoot=true at the pod level (with no
      container opting back out) or on every container, including init
      containers. Ephemeral (debug) containers are exempt so kubectl debug
      keeps working.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE
      # GKE-managed / system namespaces: blocking pod (re)creation here can
      # break DNS, logging, node upgrades, or Kyverno itself.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - gke-*
                - gmp-*
                - config-management-system
                - config-management-monitoring
                - cnrm-system
      validate:
        cel:
          variables:
            - name: allContainers
              expression: >-
                object.spec.containers + object.spec.?initContainers.orValue([])
            - name: podLevelEnforced
              # pod-level runAsNonRoot=true, and no container opts back out
              expression: >-
                object.spec.?securityContext.?runAsNonRoot.orValue(false) &&
                variables.allContainers.all(c,
                  c.?securityContext.?runAsNonRoot.orValue(true) == true)
            - name: containerLevelEnforced
              expression: >-
                variables.allContainers.all(c,
                  c.?securityContext.?runAsNonRoot.orValue(false) == true)
          expressions:
            - expression: variables.podLevelEnforced || variables.containerLevelEnforced
              message: >-
                Running as root is not allowed. Set runAsNonRoot=true on
                spec.securityContext (with no container overriding it to false),
                or on every container and init container.
