name: E2E (kind)

# Live admission tests. Only the exec policies live here: kyverno test cannot
# simulate CONNECT subresource admission, so e2e/exec-policies.sh is their
# only automated gate. Path-filtered — the fast `kyverno test` job in ci.yml
# remains the always-on gate for everything else.
on:
  push:
    branches: [main]
    paths:
      - "policies/block-pod-exec/**"
      - "policies/block-kubectl-cp/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "policies/block-pod-exec/**"
      - "policies/block-kubectl-cp/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

env:
  # Same version the suite was verified with locally.
  KIND_VERSION: v0.32.0

jobs:
  exec-e2e:
    name: Exec policies e2e (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # docker, kubectl and helm are preinstalled on ubuntu-latest.
      - name: Install kind
        run: |
          curl -sSLo kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind && sudo mv kind /usr/local/bin/

      - name: Run exec-policies e2e
        run: ./e2e/exec-policies.sh
